  <style>
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    .contact-top-grid {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 2rem;
      align-items: start;
    }

    .contact-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 2rem;
      box-shadow: var(--shadow-sm);
      margin-bottom: 1.25rem;
    }

    .contact-card h3 {
      font-size: 1.35rem;
      color: var(--dark-brown);
      margin-bottom: 0.8rem;
    }

    .contact-card p {
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 0.9rem;
    }

    .contact-point {
      display: flex;
      gap: 0.8rem;
      align-items: center;
      margin-bottom: 0.9rem;
    }

    .contact-icon-circle {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--saffron);
      color: white;
      box-shadow: var(--shadow-sm);
      margin-top: 0;
    }

    .contact-icon-circle svg {
      width: 15px;
      height: 15px;
    }

    .contact-point strong {
      color: var(--dark-brown);
    }

    .contact-point p {
      margin: 0;
    }

    .contact-form-card {
      background: transparent;
      border: 0;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
    }

    .contact-form-title {
      font-size: 2.2rem;
      color: var(--dark-brown);
      margin-bottom: 1.25rem;
    }

    .contact-form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .contact-socials {
      display: flex;
      gap: 0.5rem;
      margin-top: 1.5rem;
    }

    .contact-socials a {
      width: 30px;
      height: 30px;
      border: 1px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      background: #f5f5f5;
      font-size: 0.8rem;
      text-decoration: none;
    }

    .contact-socials a svg {
      width: 14px;
      height: 14px;
    }

    .contact-socials a:hover {
      color: var(--saffron);
      border-color: var(--saffron);
    }

    .success-msg {
      display: none;
      margin-top: 1rem;
      padding: 0.85rem 1rem;
      border-radius: var(--radius-sm);
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      color: #2e7d32;
      font-weight: 500;
    }

    .contact-map-full {
      width: 100vw;
      margin-left: calc(50% - 50vw);
      margin-top: 0.5rem;
    }

    .map-frame {
      width: 100%;
      border: 0;
      border-radius: 0;
      min-height: 380px;
      display: block;
    }

    @media(max-width:768px) {
      .contact-grid {
        grid-template-columns: 1fr;
      }

      .contact-top-grid {
        grid-template-columns: 1fr;
      }

      .contact-form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
